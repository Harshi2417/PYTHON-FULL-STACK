<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .grandparent {
        width: 600px;
        height: 100px;
        border: 5px solid black;
        padding: 5px;
        overflow: auto;
      }
      .parent::-webkit-scrollbar {
        display: none;
      }
      .parent {
        border: 5px solid blue;
        height: 90px;
        width: 1200px;
        display: flex;
        gap: 10px;
        animation: scrollH 10s linear 0s infinite normal;
      }
      .parent > div {
        flex: 1 0 auto;
        background-color: bisque;
      }
      @keyframes scrollH {
        from {
          transform: translate(0%);
        }
        to {
          transform: translate(-100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="grandparent">
      <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        <div class="child8"></div>
        <div class="child9"></div>
        <div class="child10"></div>
        <div class="child11"></div>
        <div class="child12"></div>
        <div class="child13"></div>
        <div class="child14"></div>
        <div class="child15"></div>
      </div>
    </div>
  </body>
</html>
