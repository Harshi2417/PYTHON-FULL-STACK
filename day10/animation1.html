<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      img {
        width: 500px;
        animation: lode 2s linear 2s 1 normal;
      }
      @keyframes lode {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
          transform: translate(500px);
        }
      }
      h1 {
        text-transform: uppercase;
        text-align: center;
        color: blue;
        animation: entry 5s linear 2s 1 normal;
      }
      @keyframes entry {
        from {
          opacity: 0;
          transform: translate(0px);
        }
        to {
          opacity: 1;
          transform: translate(500px);
        }
      }
    </style>
  </head>
  <body>
    <img src="beautiful.jpg" alt="error loading image" />
    <h1>hellow this is harshitha</h1>
  </body>
</html>
