<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        background-color: blue;
        border: 5px solid red;
        height: 400px;
        width: 600px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 10px;
        gap: 10px;
      }
      .parent > div {
        background-color: black;
        color: aliceblue;
        font-size: 100px;
        align-items: center;
      }
      .parent > .child1 {
        grid-column: span 2;
        grid-row: span 4;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1"></div>
      <div class="child2"></div>
      <div class="child3"></div>
      <div class="child4"></div>
      <div class="child5"></div>
      <div class="child5"></div>
      <div class="child6"></div>
    </div>
  </body>
</html>
