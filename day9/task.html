<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        background-color: blue;
        border: 5px solid red;
        height: 400px;
        width: 600px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        padding: 10px;
        gap: 10px;
      }
      .parent > div {
        background-color: black;
        color: aliceblue;
        font-size: 100px;
        align-items: center;
      }
      .parent > .child1 {
        grid-row: span 2;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">1</div>
      <div class="child2">2</div>
      <div class="child3">3</div>
    </div>
  </body>
</html>
