<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .box {
        background-color: blue;
        border: 10px solid yellow;
        height: 300px;
        width: 300px;
        margin-top: 100px;
        margin-left: 100px;
      }
      .box:hover {
        border-radius: 100%;
        background-color: green;
        transition-duration: 2s;
        transform: translate(600px, 500px) rotate(360deg);
        transform: scale(10);
        transform: skew(-180deg);
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
